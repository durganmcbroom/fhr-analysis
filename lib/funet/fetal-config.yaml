model:
  channels: 3
  dilations: [1, 1, 1]
  bottleneck_dilation: 1
  bottleneck_convs: 2
  codec_convolutions: 3   # conv-norm-relu blocks per encoder AND per decoder level (default 3)
  base_channels: 12
  dropout: 0.0

train:
  optimizer: 'AdamW'   # SGD, Adam, AdamW
  learning_rate: 3.e-4
  weight_decay: 0.2
  batch_size: 8
  epochs: 80
  crop_len: 7
  loss: 'mse'   # 'kldiv' | 'snr' | 'corr' | 'corr_amp' (corr + d' peak-contrast) | 'mse' (unit-peak comb)
  lr_schedule: 'cosine'   # 'none' (constant LR) | 'cosine' (anneal learning_rate -> min_lr over epochs)
  min_lr: 1.e-5         # cosine floor; unused when lr_schedule is 'none'
  # corr_amp only (ignored by other losses): d' rewards beats standing clear of a quiet floor.
  amp_weight: 0.1           # weight on the d' peak-contrast term; 0 = pure correlation (try 0.01-0.1)
  amp_beat_threshold: 0.1   # frac of per-item target peak above which a frame counts as a beat

data:
  train_dir: 'training/stereo_v12/fetal-train'
  test_dir: 'training/stereo_v12/fetal-train'
  num_workers: 8
  n_fft: 256
  hop_length: 256
  augment: ['channel_dropout', 'gain', 'noise']
  # SpecAugment-style masks (train-only), max width of one zeroed band per sample; 0 = off.
  freq_mask: 0   # freq bins (of 512 kept); try ~40
  time_mask: 0   # time frames; keep < one beat interval (~6 frames at hop 256 / 4kHz), try 4-6

model_dir: 'models/funet-v31/'