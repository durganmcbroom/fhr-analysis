# model (see FUNet.__init__ in src/model.py)
model:
  channels: 3   # mix is mono in the tune-ssnet snippet format
  dilations: [1, 1, 1, 1]
  bottleneck_dilation: 1

# training (see train() in src/train.py)
train:
  optimizer: 'AdamW'   # SGD, Adam, AdamW
  learning_rate: 3.e-4
  weight_decay: 0.1
  batch_size: 8
  epochs: 40
  crop_len: 7   # time series in seconds

data:
  train_dir: '../training/stereo_v1/fetal'
  num_workers: 8
  n_fft: 1024
  hop_length: 256

model_dir: '../models/funet-v1/'
#resume: '../models/funet-v1/model_best.pt'