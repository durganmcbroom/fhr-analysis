model:
  channels: 5
  dilations: [1, 2, 2, 4]
  bottleneck_dilation: 1
  bottleneck_convs: 3
  base_channels: 16
  dropout: 0.2   # Dropout2d p in bottleneck + deepest enc/dec level; 0 = off (try 0.1-0.2)

train:
  optimizer: 'AdamW'   # SGD, Adam, AdamW
  learning_rate: 3.e-4
  weight_decay: 0.2
  batch_size: 8
  epochs: 80
  crop_len: 7
  loss: 'corr'   # 'kldiv' (distribution) | 'snr' (SI-SNR, sign-invariant) | 'corr' (sign-sensitive correlation)
  lr_schedule: 'cosine'   # 'none' (constant LR) | 'cosine' (anneal learning_rate -> min_lr over epochs)
  min_lr: 1.e-5         # cosine floor; unused when lr_schedule is 'none'

data:
  train_dir: 'training/stereo_v7/fetal-train'
  test_dir: 'training/stereo_v7/fetal-test'
  num_workers: 8
  n_fft: 1024
  hop_length: 256
  augment: ['channel_dropout', 'gain', 'noise']
  # SpecAugment-style masks (train-only), max width of one zeroed band per sample; 0 = off.
  freq_mask: 0   # freq bins (of 512 kept); try ~40
  time_mask: 0   # time frames; keep < one beat interval (~6 frames at hop 256 / 4kHz), try 4-6

model_dir: 'models/funet-v15/'
