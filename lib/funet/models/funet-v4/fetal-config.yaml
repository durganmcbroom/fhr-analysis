# model (see FUNet.__init__ in src/model.py)
model:
  channels: 5   # mix is mono in the tune-ssnet snippet format
  dilations: [1, 1, 2, 4]
  bottleneck_dilation: 1
  bottleneck_convs: 3
  base_channels: 16

# training (see train() in src/train.py)
train:
  optimizer: 'AdamW'   # SGD, Adam, AdamW
  learning_rate: 3.e-4
  weight_decay: 0.2
  batch_size: 8
  epochs: 80
  crop_len: 7   # time series in seconds
  loss: 'corr'   # 'kldiv' (distribution) | 'snr' (SI-SNR, sign-invariant) | 'corr' (sign-sensitive correlation)

data:
  # paths resolve relative to this config file's directory (lib/funet/), not the CWD
  train_dir: 'training/stereo_v2/fetal-train'
  test_dir: 'training/stereo_v2/fetal-test'
  num_workers: 8
  n_fft: 1024
  hop_length: 256
  augment: ['channel_dropout', 'gain', 'noise']   # train-only; remove names to disable

model_dir: 'models/funet-v3/'
#resume: 'models/funet-v1/model_best.pt'