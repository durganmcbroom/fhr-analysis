# hyperparam
hyperparam:
  optimizer: 'AdamW'   # SGD, Adam, AdamW
  weights: '1.0, 1.0'

  batch_size: 8
  learning_rate: 3.e-4
  weight_decay: 0.1
  epochs: 40
  crop_len: 7    # time series in seconds
  loss: 'SNR'     # SDR, LogMSE, SNR, SASDR
  clip: 5

  # data
  snr_step: 5
  snr_min_l: -10
  snr_min_n: -20

  # scheduler
  factor: 0.5
  patience: 3
  earlystop_patient: 3

  # model stuff
  model_config:
    # number of input sources
    num_sources: 2
    stochastic: False

    # encoder/decoder parameters
    enc_kernel_size: 512
    enc_num_feats: 512
    enc_type: 'convolution'   # convolution, convolution, spectrogram, spectrogram2
    dec_type: 'convolution'   # convolution, group-convolution, spectrogram

    # conformer parameters
    msk_num_feats: 256
    msk_num_heads: 4
    msk_ffn_expand: 4
    msk_num_layers: 4
    msk_dropout: 0.3
    msk_individual_mask: True
    msk_type: 'transformer'   # conformer, transformer, transformer_relative

    msk_use_conv: True
    msk_kernel_size: 3
    msk_conv_layers: 6

    # wavelet analysis
    use_wavelet: False
    wavelet_scale: 8
    mother_wavelet: 'db10'

# dataset config
fold: 1     # 1 to 7
num_workers: 4
train_dir: 'training/training_clips_mono_v9/fetal-train'
train_type: 'NoNoise'    # general, resp_support, all, NoNoise, Cry, all_c

# model directory
model_dir: 'models/tuned-model-v11/'
train_resume: "../neossnet/models/model_best.pt"